name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived GitHub App installation token. Using an App identity
      # (not GITHUB_TOKEN) lets the release event published below trigger
      # downstream workflows like docker-publish.yml — GITHUB_TOKEN cannot.
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Checkout code if release was created
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.release_created }}

      # Setup Node.js for building release artifacts
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22

      # Install dependencies
      - run: npm ci --ignore-scripts
        if: ${{ steps.release.outputs.release_created }}
        
      # Build the project
      - run: npm run build
        if: ${{ steps.release.outputs.release_created }}
        
      # Build reproducible release artifact
      - name: Package release artifact
        if: ${{ steps.release.outputs.release_created }}
        env:
          RELEASE_ARTIFACT_DIR: release-artifacts
        run: node dist/scripts/create-release-artifact.js

      # Upload tarball and checksum to GitHub release
      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -eu
          tarball_path=$(find release-artifacts -maxdepth 1 -name 'webssh2-*.tar.gz' -print -quit)
          if [ -z "$tarball_path" ]; then
            echo 'tarball not found' >&2
            exit 1
          fi
          checksum_path="${tarball_path}.sha256"
          if [ ! -f "$checksum_path" ]; then
            echo 'checksum file not found' >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "$tarball_path" "$checksum_path" --clobber

      # docker-publish.yml listens for release:published and fires automatically
      # because the release above was created via the App token (not GITHUB_TOKEN).
      # No explicit workflow_dispatch is needed here.

      # Delegate downstream notification to notify-downstreams.yml. The App token
      # (with Actions: write) can dispatch workflows; GITHUB_TOKEN cannot.
      - name: Trigger downstream notifier
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh workflow run notify-downstreams.yml \
            --ref main \
            -f release_tag="$RELEASE_TAG"
